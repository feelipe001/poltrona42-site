<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poltrona 42 - Onde Assistir</title>
    <style>
        /* Animações e Estilos Globais */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(255, 159, 67, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 159, 67, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 159, 67, 0); } }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background: linear-gradient(-45deg, #090b0e, #141824, #0a0d14, #090b0e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f5f6fa; display: flex; justify-content: center; padding: 16px; min-height: 100vh; overflow-x: hidden;
        }

        .app-container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 24px; padding-bottom: 60px; animation: fadeIn 0.6s ease-out; }

        /* Componentes de Marca */
        .brand-logo { font-size: 1.1rem; font-weight: 800; color: #ff9f43; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: inline-block; transition: transform 0.2s; }
        .hero-title { font-size: 1.8rem; font-weight: 800; line-height: 1.2; color: #ffffff; margin-top: 10px;}
        .hero-subtitle { font-size: 0.95rem; color: #a4b0be; margin-top: 6px; }

        /* Busca */
        .search-wrapper { position: relative; width: 100%; z-index: 10; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: #747d8c; transition: fill 0.3s; }
        .clear-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; fill: #747d8c; cursor: pointer; display: none; }
        .search-input { width: 100%; padding: 18px 48px; background-color: rgba(21, 24, 31, 0.8); backdrop-filter: blur(10px); border: 1px solid #2a303c; border-radius: 16px; color: #fff; font-size: 1.05rem; outline: none; }
        
        /* Overlay de Instrução (Vídeo Telegram) */
        #instructionOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 11, 14, 0.95); z-index: 1000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .close-overlay { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2rem; cursor: pointer; }
        .instruction-video { width: 100%; max-width: 360px; border-radius: 16px; border: 2px solid #ff9f43; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }

        /* Botões */
        .btn-telegram { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; background: linear-gradient(90deg, #27A7E7, #0088cc); color: #fff; border-radius: 12px; font-weight: 800; text-decoration: none; text-transform: uppercase; margin-top: 10px;}
        .btn-tv { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; background: linear-gradient(90deg, #ff9f43, #ff7b00); color: #fff; border-radius: 12px; font-weight: 800; text-decoration: none; text-transform: uppercase; animation: pulseGlow 2.5s infinite; }
        .cta-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        /* Elementos da página */
        #homeState, .movie-result { display: flex; flex-direction: column; gap: 30px; }
        .conversion-card { background: linear-gradient(145deg, #1f140b 0%, #120b05 100%); border: 1px solid rgba(255, 159, 67, 0.3); border-radius: 18px; padding: 24px 20px; text-align: center; }
        .section-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 14px; }
        .trending-scroll { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 15px; }
        .trending-poster { width: 110px; height: 160px; border-radius: 12px; object-fit: cover; }
        .movie-result { background: rgba(17, 20, 26, 0.9); border-radius: 20px; padding: 20px; display: none; }
        .movie-info { display: flex; gap: 16px; }
        .movie-poster { width: 110px; height: 165px; border-radius: 12px; object-fit: cover; }
        .movie-title { font-size: 1.4rem; font-weight: 800; color: #fff; }
        .movie-synopsis { font-size: 0.85rem; color: #a4b0be; }
        .platform-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #1c202b; border-radius: 14px; margin-bottom: 10px;}
    </style>
</head>
<body>

    <!-- Overlay de Instrução (Oculto por padrão) -->
    <div id="instructionOverlay">
        <span class="close-overlay" onclick="closeOverlay()">×</span>
        <h2 style="margin-bottom: 20px; color: #fff;">Como assistir no Telegram</h2>
        <video class="instruction-video" autoplay muted playsinline loop>
            <source src="https://res.cloudinary.com/dxpygpngo/video/upload/v1782309153/IMG_0039_h0wgrc.mov" type="video/mp4">
        </video>
        <a href="https://pay.lowify.com.br/checkout?product_id=TzLxa0" target="_blank" class="btn-telegram">
            Assinar Plano Telegram
        </a>
    </div>

    <div class="app-container">
        <header class="header">
            <a href="#" onclick="resetToHome(); return false;" class="brand-logo">💺 Poltrona 42</a>
            <div>
                <h1 class="hero-title">O que você vai<br>assistir hoje?</h1>
            </div>
        </header>

        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Digite o nome do filme ou série...">
            <svg class="clear-icon" id="clearSearch" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>
        
        <div id="homeState">
            <div class="conversion-card">
                <h3 class="conversion-title">Liberar acesso <span>imediato:</span></h3>
                <div class="cta-group">
                    <button onclick="showTelegramOverlay()" class="btn-telegram">🎬 Ver como funciona (Telegram)</button>
                    <a href="https://pay.lowify.com.br/checkout?product_id=6jU9sA" target="_blank" class="btn-tv">📺 App Smart TV</a>
                </div>
            </div>
            <div id="trendingList" class="trending-scroll"></div>
        </div>

        <main id="movieResult" class="movie-result">
            <div class="movie-info">
                <img id="moviePoster" src="" alt="Pôster" class="movie-poster">
                <div class="movie-details">
                    <h1 id="movieTitle" class="movie-title"></h1>
                    <p id="movieSynopsis" class="movie-synopsis"></p>
                </div>
            </div>
            <div id="platformsList"></div>
            <div class="conversion-card">
                <div class="cta-group">
                    <button onclick="showTelegramOverlay()" class="btn-telegram">🎬 Ver como funciona (Telegram)</button>
                    <a href="https://pay.lowify.com.br/checkout?product_id=6jU9sA" target="_blank" class="btn-tv">📺 App Smart TV</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = '674f80dffb5bc79391154b02a822fec8';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';

        function showTelegramOverlay() { document.getElementById('instructionOverlay').style.display = 'flex'; }
        function closeOverlay() { document.getElementById('instructionOverlay').style.display = 'none'; }
        
        function resetToHome() {
            document.getElementById('movieResult').style.display = 'none';
            document.getElementById('homeState').style.display = 'flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // [Restante da lógica JS de busca permanece a mesma...]

    </script>
</body>
</html>
