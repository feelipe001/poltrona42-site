<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poltrona 42 - Onde Assistir</title>
    <style>
        /* Animações Globais */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(255, 159, 67, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 159, 67, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 159, 67, 0); } }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Reset e Estilos de Base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background: linear-gradient(-45deg, #090b0e, #141824, #0a0d14, #090b0e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f5f6fa; 
            display: flex; 
            justify-content: center; 
            padding: 16px; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .app-container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 24px; padding-bottom: 60px; animation: fadeIn 0.6s ease-out; }

        /* Overlay de Instrução */
        #instructionOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(9, 11, 14, 0.95); z-index: 2000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; backdrop-filter: blur(8px);
        }
        .overlay-content { 
            background: #1c202b; padding: 25px; border-radius: 20px; 
            text-align: center; max-width: 380px; width: 100%; 
            border: 1px solid #2a303c; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .instruction-video { 
            width: 100%; max-height: 400px; border-radius: 12px; margin: 15px 0;
            object-fit: contain; background: #000;
        }
        .close-btn { 
            background: none; border: none; color: #747d8c; font-size: 1rem; 
            cursor: pointer; margin-top: 15px; text-decoration: underline;
        }

        /* Header e Hero Section */
        .header { text-align: center; margin-top: 10px; display: flex; flex-direction: column; gap: 16px; }
        .brand-logo { font-size: 1.1rem; font-weight: 800; color: #ff9f43; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: inline-block; transition: transform 0.2s; }
        .brand-logo:active { transform: scale(0.95); }
        .hero-title { font-size: 1.8rem; font-weight: 800; line-height: 1.2; color: #ffffff; margin-top: 10px;}
        .hero-subtitle { font-size: 0.95rem; color: #a4b0be; margin-top: 6px; }

        /* Barra de Busca */
        .search-wrapper { position: relative; width: 100%; z-index: 10; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: #747d8c; }
        .clear-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; fill: #747d8c; cursor: pointer; display: none; }
        .search-input { width: 100%; padding: 18px 48px; background-color: rgba(21, 24, 31, 0.8); backdrop-filter: blur(10px); border: 1px solid #2a303c; border-radius: 16px; color: #fff; font-size: 1.05rem; outline: none; }

        /* Chips */
        .category-chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { background-color: #1c202b; color: #ced6e0; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; border: 1px solid #2a303c; cursor: pointer; }

        /* Conversão */
        .conversion-card { background: linear-gradient(145deg, #1f140b 0%, #120b05 100%); border: 1px solid rgba(255, 159, 67, 0.3); border-radius: 18px; padding: 24px 20px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .conversion-title { font-size: 1.2rem; font-weight: 900; color: #ffffff; margin-bottom: 15px; }
        .cta-group { display: flex; flex-direction: column; gap: 12px; }
        
        .btn-telegram { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; background: linear-gradient(90deg, #27A7E7, #0088cc); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; text-decoration: none; cursor: pointer; }
        .btn-tv { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; background: linear-gradient(90deg, #ff9f43, #ff7b00); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; text-decoration: none; animation: pulseGlow 2.5s infinite; }

        /* Lista e Resultados */
        .movie-result { display: none; flex-direction: column; gap: 24px; }
        .platform-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #1c202b; border-radius: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="instructionOverlay">
        <div class="overlay-content">
            <h2 style="color: #fff; font-size: 1.2rem; margin-bottom: 15px;">Como assistir pelo Telegram</h2>
            <video class="instruction-video" autoplay muted playsinline loop>
                <source src="https://res.cloudinary.com/dxpygpngo/video/upload/v1782309153/IMG_0039_h0wgrc.mov" type="video/mp4">
            </video>
            <a href="https://pay.lowify.com.br/checkout?product_id=TzLxa0" target="_blank" class="btn-telegram">Assistir Agora</a>
            <button class="close-btn" onclick="closeOverlay()">Fechar</button>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <a href="#" onclick="resetToHome(); return false;" class="brand-logo">💺 Poltrona 42</a>
            <div>
                <h1 class="hero-title">O que você vai<br>assistir hoje?</h1>
                <p class="hero-subtitle">Descubra em qual streaming o filme está.</p>
            </div>
        </header>

        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Digite o nome do filme ou série...">
        </div>

        <div class="category-chips">
            <div class="chip" onclick="autoSearch('Ação')">🔥 Ação</div>
            <div class="chip" onclick="autoSearch('Terror')">👻 Terror</div>
            <div class="chip" onclick="autoSearch('Comédia')">😂 Comédia</div>
        </div>

        <div id="homeState">
            <div class="conversion-card">
                <h3 class="conversion-title">Liberar acesso imediato:</h3>
                <div class="cta-group">
                    <button onclick="showTelegramOverlay()" class="btn-telegram">Plano Telegram</button>
                    <a href="https://pay.lowify.com.br/checkout?product_id=6jU9sA" target="_blank" class="btn-tv">📺 App Smart TV</a>
                </div>
            </div>
        </div>

        <main id="movieResult" class="movie-result">
            <div id="platformsList"></div>
            <div class="conversion-card">
                <h3 class="conversion-title">Liberar acesso imediato:</h3>
                <div class="cta-group">
                    <button onclick="showTelegramOverlay()" class="btn-telegram">Plano Telegram</button>
                    <a href="https://pay.lowify.com.br/checkout?product_id=6jU9sA" target="_blank" class="btn-tv">📺 App Smart TV</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        function showTelegramOverlay() { document.getElementById('instructionOverlay').style.display = 'flex'; }
        function closeOverlay() { document.getElementById('instructionOverlay').style.display = 'none'; }
        
        function resetToHome() {
            document.getElementById('movieResult').style.display = 'none';
            document.getElementById('homeState').style.display = 'flex';
        }
    </script>
</body>
</html>
