        /* Reset e Estilos de Base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #090b0e; color: #f5f6fa; display: flex; justify-content: center; padding: 12px; min-height: 100vh; }
        .app-container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 30px; }
        .header { text-align: center; margin-top: 10px; }
        .profile-tag { font-size: 1.1rem; font-weight: 700; color: #ff9f43; text-decoration: none; letter-spacing: 0.5px; }
        
        /* Barra de Busca */
        .search-container { position: relative; }
        .search-input { width: 100%; padding: 16px 20px; background-color: #15181f; border: 1px solid #222733; border-radius: 14px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .search-input:focus { border-color: #ff9f43; box-shadow: 0 0 0 2px rgba(255, 159, 67, 0.15); }

        .loading { text-align: center; font-size: 0.9rem; color: #a4b0be; display: none; margin-top: 10px; }

        /* Bloco de Resultado */
        .movie-result { background-color: #11141a; border-radius: 16px; border: 1px solid #1c202b; padding: 20px; display: none; flex-direction: column; gap: 20px; }
        .movie-info { display: flex; gap: 16px; }
        .movie-poster { width: 105px; height: 155px; background-color: #1d222f; border-radius: 10px; object-fit: cover; box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4); }

        .movie-title { font-size: 1.3rem; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
        .movie-meta { font-size: 0.85rem; color: #a4b0be; margin-bottom: 10px; }
        .movie-synopsis { font-size: 0.85rem; color: #ced6e0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Seção de Streaming */
        .streaming-section { display: flex; flex-direction: column; gap: 10px; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #747d8c; font-weight: 700; margin-bottom: 2px; }
        .platforms-list { display: flex; flex-direction: column; gap: 8px; }
        .platform-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background-color: #171b24; border: 1px solid #222836; border-radius: 12px; }
        .platform-left { display: flex; align-items: center; gap: 12px; }
        .platform-logo { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; }
        .platform-name { font-size: 0.95rem; font-weight: 600; }
        .platform-status { font-size: 0.85rem; color: #a4b0be; }
        .no-providers { font-size: 0.9rem; color: #a4b0be; text-align: center; padding: 10px; background: #15181f; border-radius: 8px; }
        
        /* Conversão: Poltrona 42 */
        .conversion-card { background: linear-gradient(135deg, #191d29 0%, #0e1118 100%); border: 2px solid #ff9f43; border-radius: 14px; padding: 20px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 10px 25px rgba(255, 159, 67, 0.1); margin-top: 10px;}
        .conversion-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; color: #ffffff; }
        .conversion-subtitle { font-size: 0.85rem; color: #ced6e0; margin-bottom: 16px; line-height: 1.4; }
        .cta-button { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 16px; background-color: #ff9f43; color: #090b0e; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; text-decoration: none; transition: background-color 0.2s, transform 0.1s; box-shadow: 0 4px 15px rgba(255, 159, 67, 0.3); }
        .cta-button:active { transform: scale(0.98); background-color: #e08b36; }
    </style>
</head>
