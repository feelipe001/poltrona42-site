<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poltrona 42 - Onde Assistir</title>
    <style>
        /* Animações Globais */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(255, 159, 67, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 159, 67, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 159, 67, 0); } }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Reset e Estilos de Base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background: linear-gradient(-45deg, #090b0e, #141824, #0a0d14, #090b0e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f5f6fa; 
            display: flex; 
            justify-content: center; 
            padding: 16px; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .app-container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 24px; padding-bottom: 60px; animation: fadeIn 0.6s ease-out; }

        /* Overlay de Instrução Adicionado */
        #instructionOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 11, 14, 0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .overlay-content { background: #1c202b; padding: 25px; border-radius: 20px; text-align: center; max-width: 380px; width: 100%; border: 1px solid #2a303c; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        
        /* Container do vídeo com botão de áudio */
        .video-container { position: relative; width: 100%; margin: 15px 0; }
        .instruction-video { width: 100%; max-height: 400px; border-radius: 12px; object-fit: contain; background: #000; display: block; }
        .audio-btn { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.6); border: none; color: white; padding: 8px; border-radius: 50%; cursor: pointer; font-size: 16px; }
        
        .close-btn { background: none; border: none; color: #747d8c; font-size: 1rem; cursor: pointer; margin-top: 15px; text-decoration: underline; }

        /* Header e Hero Section */
        .header { text-align: center; margin-top: 10px; display: flex; flex-direction: column; gap: 16px; }
        
        .brand-logo { font-size: 1.1rem; font-weight: 800; color: #ff9f43; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: inline-block; transition: transform 0.2s; }
        .brand-logo:active { transform: scale(0.95); }
        
        .hero-title { font-size: 1.8rem; font-weight: 800; line-height: 1.2; color: #ffffff; margin-top: 10px;}
        .hero-subtitle { font-size: 0.95rem; color: #a4b0be; margin-top: 6px; }

        /* Barra de Busca Avançada */
        .search-wrapper { position: relative; width: 100%; z-index: 10; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: #747d8c; transition: fill 0.3s; }
        
        .clear-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; fill: #747d8c; cursor: pointer; display: none; transition: fill 0.2s, transform 0.2s; }
        .clear-icon:hover { fill: #ff9f43; }
        .clear-icon:active { transform: translateY(-50%) scale(0.85); }

        .search-input { width: 100%; padding: 18px 48px; background-color: rgba(21, 24, 31, 0.8); backdrop-filter: blur(10px); border: 1px solid #2a303c; border-radius: 16px; color: #fff; font-size: 1.05rem; outline: none; transition: all 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .search-input:focus { border-color: #ff9f43; box-shadow: 0 0 0 3px rgba(255, 159, 67, 0.2), 0 8px 24px rgba(0,0,0,0.4); }
        .search-input:focus + .search-icon { fill: #ff9f43; }

        /* Chips de Categoria */
        .category-chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .category-chips::-webkit-scrollbar { display: none; }
        .chip { background-color: #1c202b; color: #ced6e0; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; border: 1px solid #2a303c; transition: all 0.2s; cursor: pointer; }
        .chip:active { transform: scale(0.95); background-color: #ff9f43; color: #000; border-color: #ff9f43; }

        /* Loading Animado */
        .loading { text-align: center; display: none; margin-top: 20px; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255, 159, 67, 0.3); border-radius: 50%; border-top-color: #ff9f43; animation: spin 1s ease-in-out infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TELA INICIAL */
        #homeState { display: flex; flex-direction: column; gap: 30px; animation: fadeIn 0.5s ease-out; }
        .section-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        
        .trending-scroll { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .trending-item { flex: 0 0 auto; width: 110px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); scroll-snap-align: start; position: relative;}
        .trending-item:active { transform: scale(0.92); }
        .trending-poster { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; box-shadow: 0 6px 12px rgba(0,0,0,0.5); transition: box-shadow 0.3s; }
        
        /* Conversão: Poltrona 42 com Dois Botões */
        .conversion-card { background: linear-gradient(145deg, #1f140b 0%, #120b05 100%); border: 1px solid rgba(255, 159, 67, 0.3); border-radius: 18px; padding: 24px 20px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .conversion-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 6px; color: #ffffff; }
        .conversion-title span { color: #ff9f43; }
        .conversion-subtitle { font-size: 0.9rem; color: #ced6e0; margin-bottom: 15px; line-height: 1.4; }
        
        .cta-group { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 5px; }
        
        .btn-telegram {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px;
            background: linear-gradient(90deg, #27A7E7, #0088cc); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 6px 20px rgba(0, 136, 204, 0.25); cursor: pointer;
        }
        .btn-telegram:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0, 136, 204, 0.3); }

        .btn-tv {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px;
            background: linear-gradient(90deg, #ff9f43, #ff7b00); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px; position: relative; overflow: hidden; animation: pulseGlow 2.5s infinite; transition: transform 0.2s;
        }
        .btn-tv::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 3s infinite; }
        .btn-tv:active { transform: scale(0.96); }

        /* Reveal e Marquee */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .genre-section { display: flex; flex-direction: column; overflow: hidden; }
        .marquee-container { width: 100%; overflow: hidden; position: relative; padding-bottom: 10px;}
        .marquee-track { display: flex; gap: 12px; width: max-content; animation: scrollMarquee 40s linear infinite; }
        .marquee-track.reverse { animation-direction: reverse; }
        .marquee-item { width: 105px; flex-shrink: 0; cursor: pointer; transition: transform 0.2s; }
        .marquee-item img { width: 100%; height: 155px; border-radius: 10px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Bloco de Resultado */
        .movie-result { background-color: rgba(17, 20, 26, 0.9); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid #2a303c; padding: 20px; display: none; flex-direction: column; gap: 24px; animation: fadeIn 0.4s ease-out; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .movie-info { display: flex; gap: 16px; cursor: pointer; }
        .movie-poster { width: 110px; height: 165px; border-radius: 12px; object-fit: cover; }
        .movie-details { display: flex; flex-direction: column; justify-content: center; flex: 1; }
        .movie-title { font-size: 1.4rem; font-weight: 800; color: #fff; }
        .movie-meta { font-size: 0.85rem; color: #ff9f43; font-weight: 600; }
        .movie-synopsis { font-size: 0.85rem; color: #a4b0be; }
        .platforms-list { display: flex; flex-direction: column; gap: 10px; }
        .platform-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #1c202b; border-radius: 14px; }
        .no-providers { font-size: 0.9rem; color: #a4b0be; text-align: center; padding: 15px; }
    </style>
</head>
<body>

    <div id="instructionOverlay">
        <div class="overlay-content">
            <h2 style="color: #fff; font-size: 1.2rem; margin-bottom: 15px;">Como assistir pelo Telegram</h2>
            <div class="video-container">
                <video id="instVideo" class="instruction-video" autoplay muted playsinline loop>
                    <source src="https://res.cloudinary.com/dxpygpngo/video/upload/v1782309153/IMG_0039_h0wgrc.mov" type="video/mp4">
                </video>
                <button class="audio-btn" onclick="toggleAudio()">🔊</button>
            </div>
            <a href="https://pay.lowify.com.br/checkout?product_id=TzLxa0" target="_blank" class="btn-telegram">Assistir Agora</a>
            <button class="close-btn" onclick="closeOverlay()">Fechar</button>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <a href="#" onclick="resetToHome(); return false;" class="brand-logo">💺 Poltrona 42</a>
            <div>
                <h1 class="hero-title">O que você vai<br>assistir hoje?</h1>
                <p class="hero-subtitle">Descubra em qual streaming o filme está.</p>
            </div>
        </header>

        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Digite o nome do filme ou série...">
        </div>

        <div id="homeState">
            <div class="conversion-card reveal">
                <h3 class="conversion-title">Liberar acesso <span>imediato:</span></h3>
                <div class="cta-group">
                    <button onclick="showTelegramOverlay()" class="btn-telegram">🎬 Ver como funciona (Telegram)</button>
                    <a href="https://pay.lowify.com.br/checkout?product_id=6jU9sA" target="_blank" class="btn-tv">📺 App Smart TV</a>
                </div>
            </div>
        </div>

        <main id="movieResult" class="movie-result">
            <div id="platformsList" class="platforms-list"></div>
            <div class="conversion-card">
                <div class="cta-group">
                    <button onclick="showTelegramOverlay()" class="btn-telegram">🎬 Ver como funciona (Telegram)</button>
                    <a href="https://pay.lowify.com.br/checkout?product_id=6jU9sA" target="_blank" class="btn-tv">📺 App Smart TV</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('instVideo');
        function showTelegramOverlay() { 
            document.getElementById('instructionOverlay').style.display = 'flex'; 
            video.play();
        }
        function closeOverlay() { 
            document.getElementById('instructionOverlay').style.display = 'none'; 
            video.pause();
        }
        function toggleAudio() {
            video.muted = !video.muted;
            document.querySelector('.audio-btn').innerText = video.muted ? "🔊" : "🔇";
        }
        function resetToHome() {
            document.getElementById('movieResult').style.display = 'none';
            document.getElementById('homeState').style.display = 'flex';
        }
        // ... (Manter o restante da lógica JS de busca)
    </script>
</body>
</html>
