<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação Exclusiva</title>
    <style>
        /* Estilos Globais */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        /* Headline */
        h1 {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .highlight {
            color: #f39c12; /* Cor de destaque para palavras-chave */
        }

        /* Container do Vídeo (Responsivo 16:9) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botão de Vendas (Oculto inicialmente) */
        .cta-button {
            display: none; /* Mantém oculto até o JS ativar */
            background-color: #27ae60;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 5px;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #1e8449;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .cta-button:hover {
            background-color: #2ecc71;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1e8449;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Headline -->
        <h1>Descubra o Método Exato Para <span class="highlight">Resolver o Principal Problema</span> do Seu Cliente</h1>

        <!-- VSL -->
        <div class="video-wrapper">
            <!-- Substitua o link do src pelo seu vídeo -->
            <iframe src="SEU_LINK_DO_VIDEO_AQUI" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>

        <!-- Botão de Redirecionamento -->
        <a href="LINK_DA_SUA_PAGINA_DE_VENDAS" class="cta-button" id="btn-oferta">Quero Garantir Meu Acesso Agora</a>
    </div>

    <!-- Script de Delay do Botão -->
    <script>
        // Tempo em milissegundos para o botão aparecer (Ex: 120000 = 2 minutos)
        const tempoDelay = 120000; 

        setTimeout(function() {
            document.getElementById('btn-oferta').style.display = 'block';
        }, tempoDelay);
    </script>

</body>
</html>
